<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Sports Dashboard</title>
    <style>
        :root {
            --bg-base: #0f172a;
            --bg-surface: #1e293b;
            --bg-card: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --accent: #ef4444;
            --border: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar UI */
        aside {
            width: 260px;
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
        }

        .brand h1 {
            font-size: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item button {
            width: 100%;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px 16px;
            border-radius: 8px;
            text-align: left;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-item button:hover, .menu-item.active button {
            background-color: var(--bg-card);
            color: var(--text-main);
        }

        .menu-item.active button {
            border-left: 4px solid var(--primary);
        }

        /* Main Content Area */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .refresh-indicator {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: var(--bg-surface);
            padding: 6px 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        /* Dashboard Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        /* Advanced Game Cards */
        .game-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .game-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .broadcast {
            background: var(--bg-card);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--text-main);
        }

        .team-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-details {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .team-logo {
            width: 36px;
            height: 36px;
            object-fit: contain;
        }

        .team-meta {
            display: flex;
            flex-direction: column;
        }

        .team-name {
            font-size: 1.05rem;
            font-weight: 600;
        }

        .team-record {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .team-score {
            font-size: 1.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .winner {
            color: var(--primary);
        }

        /* Situational Headline Info */
        .card-footer {
            border-top: 1px solid var(--border);
            padding-top: 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .headline {
            color: #f59e0b;
            font-style: italic;
        }

        .status-msg {
            text-align: center;
            grid-column: 1 / -1;
            padding: 40px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            aside {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            main {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <aside>
        <div class="brand">
            <h1>📊 SportPulse</h1>
        </div>
        <ul class="menu-list">
            <li class="menu-item active" data-sport="basketball/nba"><button onclick="changeSport('basketball/nba', this)">🏀 NBA</button></li>
            <li class="menu-item" data-sport="football/nfl"><button onclick="changeSport('football/nfl', this)">🏈 NFL</button></li>
            <li class="menu-item" data-sport="baseball/mlb"><button onclick="changeSport('baseball/mlb', this)">⚾ MLB</button></li>
            <li class="menu-item" data-sport="hockey/nhl"><button onclick="changeSport('hockey/nhl', this)">🏒 NHL</button></li>
            <li class="menu-item" data-sport="soccer/eng.1"><button onclick="changeSport('soccer/eng.1', this)">⚽ Premier League</button></li>
        </ul>
    </aside>

    <main>
        <header>
            <h2 id="sport-title">NBA Scores</h2>
            <div class="refresh-indicator" id="refresh-time">Syncing...</div>
        </header>

        <div class="dashboard-grid" id="dashboard-grid">
            <div class="status-msg">Loading modern analytics dashboard...</div>
        </div>
    </main>

    <script>
        let endpoint = 'basketball/nba';
        let autoRefreshInterval;

        async function fetchDashboardData() {
            const grid = document.getElementById('dashboard-grid');
            const updateLabel = document.getElementById('refresh-time');

            try {
                const response = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${endpoint}/scoreboard`);
                if (!response.ok) throw new Error('Network latency issue detected.');
                const data = await response.json();
                
                renderCards(data.events);
                
                const now = new Date();
                updateLabel.textContent = `Live • Updated ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})}`;
            } catch (err) {
                console.error(err);
                grid.innerHTML = `<div class="status-msg">Data fetch interrupted. Confirming endpoint availability...</div>`;
            }
        }

        function renderCards(events) {
            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = '';

            if (!events || events.length === 0) {
                grid.innerHTML = '<div class="status-msg">No active games or events cataloged for this period.</div>';
                return;
            }

            events.forEach(game => {
                const match = game.competitions[0];
                const statusType = game.status.type;
                const statusText = game.status.type.detail;
                
                const home = match.competitors.find(t => t.homeAway === 'home');
                const away = match.competitors.find(t => t.homeAway === 'away');

                const isCompleted = statusType.completed;
                const homeScore = parseInt(home.score);
                const awayScore = parseInt(away.score);

                // Broadcast network check
                const broadcast = match.broadcasts?.[0]?.names?.[0] || '';

                // Situational details (e.g. key leader statistics or match notes)
                const note = game.headlines?.[0]?.shortLinkText || match.notes?.[0]?.headline || '';

                const card = document.createElement('div');
                card.className = 'game-card';

                card.innerHTML = `
                    <div class="card-header">
                        <span>${statusText}</span>
                        ${broadcast ? `<span class="broadcast">${broadcast}</span>` : ''}
                    </div>
                    <div class="team-box">
                        <div class="team-row">
                            <div class="team-details">
                                <img class="team-logo" src="${away.team.logo || 'https://via.placeholder.com/36'}" alt="logo">
                                <div class="team-meta">
                                    <span class="team-name">${away.team.displayName}</span>
                                    <span class="team-record">${away.records?.[0]?.summary || ''}</span>
                                </div>
                            </div>
                            <span class="team-score ${isCompleted && awayScore > homeScore ? 'winner' : ''}">${away.score}</span>
                        </div>
                        <div class="team-row">
                            <div class="team-details">
                                <img class="team-logo" src="${home.team.logo || 'https://via.placeholder.com/36'}" alt="logo">
                                <div class="team-meta">
                                    <span class="team-name">${home.team.displayName}</span>
                                    <span class="team-record">${home.records?.[0]?.summary || ''}</span>
                                </div>
                            </div>
                            <span class="team-score ${isCompleted && homeScore > awayScore ? 'winner' : ''}">${home.score}</span>
                        </div>
                    </div>
                    ${note ? `
                    <div class="card-footer">
                        <span class="headline">💡 ${note}</span>
                    </div>` : ''}
                `;
                grid.appendChild(card);
            });
        }

        function changeSport(newEndpoint, element) {
            endpoint = newEndpoint;
            
            // UI state configuration
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            element.parentElement.classList.add('active');
            
            document.getElementById('sport-title').textContent = element.textContent + " Scores";
            
            fetchDashboardData();
        }

        // Initialize background data routine
        fetchDashboardData();
        clearInterval(autoRefreshInterval);
        autoRefreshInterval = setInterval(fetchDashboardData, 20000);
    </script>
</body>
</html>
