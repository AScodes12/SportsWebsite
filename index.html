<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportPulse Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-sidebar: #111827;
            --bg-card: #1f2937;
            --bg-card-hover: #374151;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --color-primary: #38bdf8;
            --color-live: #ef4444;
            --color-win: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            letter-spacing: -0.01em;
        }

        /* Sidebar Navigation */
        aside {
            width: 260px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            gap: 40px;
        }

        .brand h1 {
            font-size: 1.25rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-main);
        }

        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item button {
            width: 100%;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 12px 16px;
            border-radius: 8px;
            text-align: left;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-item button:hover {
            background-color: var(--bg-card);
            color: var(--text-main);
        }

        .menu-item.active button {
            background-color: var(--bg-card);
            color: var(--color-primary);
            border-color: rgba(56, 189, 248, 0.2);
        }

        /* Main Workspace */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 32px 40px;
            border-bottom: 1px solid var(--border);
            background-color: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(8px);
        }

        header h2 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .refresh-status {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 6px;
        }

        /* Twin Column Content Layout */
        .content-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .scores-view {
            flex: 3;
            padding: 40px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            align-content: start;
        }

        .side-panel {
            flex: 1.2;
            border-left: 1px solid var(--border);
            background-color: var(--bg-sidebar);
            padding: 40px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .side-panel h3 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        /* Structured Cards */
        .game-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }

        .game-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .badge-live {
            color: var(--color-live);
            font-weight: 800;
        }

        .network-tag {
            background-color: rgba(255, 255, 255, 0.08);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--text-main);
        }

        .team-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .team-logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .team-info {
            display: flex;
            flex-direction: column;
        }

        .team-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .team-record {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .team-score {
            font-size: 1.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--text-muted);
        }

        /* Visual Win States */
        .winner .team-name {
            color: var(--text-main);
            font-weight: 700;
        }
        .winner .team-score {
            color: var(--text-main);
        }

        /* News and Highlight Items */
        .news-item {
            padding: 16px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .news-title {
            font-weight: 600;
            color: var(--text-main);
        }

        .news-link {
            font-size: 0.8rem;
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .news-link:hover {
            text-decoration: underline;
        }

        .system-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px;
            color: var(--text-muted);
            font-size: 1rem;
        }

        @media (max-width: 1024px) {
            .content-container { flex-direction: column; overflow: auto; }
            .side-panel { border-left: none; border-top: 1px solid var(--border); }
            .scores-view { overflow: visible; }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            aside { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 20px; gap: 20px; }
            header { padding: 20px; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="brand">
            <h1>SportPulse</h1>
        </div>
        <ul class="menu-list">
            <li class="menu-item active"><button onclick="updateDashboard('basketball/nba', this)">NBA</button></li>
            <li class="menu-item"><button onclick="updateDashboard('football/nfl', this)">NFL</button></li>
            <li class="menu-item"><button onclick="updateDashboard('baseball/mlb', this)">MLB</button></li>
            <li class="menu-item"><button onclick="updateDashboard('hockey/nhl', this)">NHL</button></li>
            <li class="menu-item"><button onclick="updateDashboard('soccer/eng.1', this)">Premier League</button></li>
        </ul>
    </aside>

    <main>
        <header>
            <h2 id="view-title">NBA Scores</h2>
            <div class="refresh-status" id="timestamp">Syncing</div>
        </header>

        <div class="content-container">
            <div class="scores-view" id="scores-display">
                <div class="system-message">Loading active schedules</div>
            </div>
            
            <div class="side-panel">
                <h3>Leaguewide Coverage</h3>
                <div id="headlines-display">
                    <div class="news-item">Gathering current media updates</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let selectedSport = 'basketball/nba';
        let backgroundProcess;

        async function loadData() {
            const scoresContainer = document.getElementById('scores-display');
            const headlinesContainer = document.getElementById('headlines-display');
            const timeLabel = document.getElementById('timestamp');

            try {
                const response = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${selectedSport}/scoreboard`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                buildScoreCards(data.events, scoresContainer);
                buildHeadlines(data.events, headlinesContainer);
                
                const time = new Date();
                timeLabel.textContent = `Updated ${time.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})}`;
            } catch (error) {
                scoresContainer.innerHTML = `<div class="system-message">Unable to retrieve current data. Retrying connection.</div>`;
            }
        }

        function buildScoreCards(events, target) {
            target.innerHTML = '';

            if (!events || events.length === 0) {
                target.innerHTML = '<div class="system-message">No matchups scheduled for this date.</div>';
                return;
            }

            events.forEach(game => {
                const details = game.competitions[0];
                const state = game.status.type;
                
                const home = details.competitors.find(t => t.homeAway === 'home');
                const away = details.competitors.find(t => t.homeAway === 'away');

                const finished = state.completed;
                const active = state.state === 'in';
                const hScore = parseInt(home.score) || 0;
                const aScore = parseInt(away.score) || 0;

                const station = details.broadcasts?.[0]?.names?.[0] || '';

                const card = document.createElement('div');
                card.className = 'game-card';

                card.innerHTML = `
                    <div class="card-meta">
                        <span class="${active ? 'badge-live' : ''}">${active ? 'Live' : state.detail}</span>
                        ${station ? `<span class="network-tag">${station}</span>` : ''}
                    </div>
                    <div class="team-section">
                        <div class="team-row ${finished && aScore > hScore ? 'winner' : ''}">
                            <div class="team-profile">
                                <img class="team-logo" src="${away.team.logo || 'https://via.placeholder.com/32'}" alt="">
                                <div class="team-info">
                                    <span class="team-name">${away.team.displayName}</span>
                                    <span class="team-record">${away.records?.[0]?.summary || '0-0'}</span>
                                </div>
                            </div>
                            <span class="team-score">${away.score}</span>
                        </div>
                        <div class="team-row ${finished && hScore > aScore ? 'winner' : ''}">
                            <div class="team-profile">
                                <img class="team-logo" src="${home.team.logo || 'https://via.placeholder.com/32'}" alt="">
                                <div class="team-info">
                                    <span class="team-name">${home.team.displayName}</span>
                                    <span class="team-record">${home.records?.[0]?.summary || '0-0'}</span>
                                </div>
                            </div>
                            <span class="team-score">${home.score}</span>
                        </div>
                    </div>
                `;
                target.appendChild(card);
            });
        }

        function buildHeadlines(events, target) {
            target.innerHTML = '';
            let storyCount = 0;

            if (events) {
                events.forEach(game => {
                    if (game.headlines?.[0] && storyCount < 5) {
                        const story = game.headlines[0];
                        const item = document.createElement('div');
                        item.className = 'news-item';
                        item.innerHTML = `
                            <div class="news-title">${story.description || story.shortLinkText}</div>
                            ${story.link ? `<a class="news-link" href="${story.link}" target="_blank">Read Analysis</a>` : ''}
                        `;
                        target.appendChild(item);
                        storyCount++;
                    }
                });
            }

            if (storyCount === 0) {
                target.innerHTML = '<div class="news-item">No editorial headlines listed for active matchups.</div>';
            }
        }

        function updateDashboard(path, emitter) {
            selectedSport = path;
            
            document.querySelectorAll('.menu-item').forEach(li => li.classList.remove('active'));
            emitter.parentElement.classList.add('active');
            
            document.getElementById('view-title').textContent = `${emitter.textContent} Scores`;
            
            loadData();
        }

        loadData();
        clearInterval(backgroundProcess);
        backgroundProcess = setInterval(loadData, 30000);
    </script>
</body>
</html>
