<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESPN Flow Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,700;1,700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --espn-red: #cc0000;
            --bg-body: #f4f4f4;
            --bg-navbar: #1c1c1f;
            --bg-ticker: #ffffff;
            --bg-card: #ffffff;
            --border-color: #e2e2e2;
            --text-dark: #1a1a1a;
            --text-muted: #6c6c70;
            --live-color: #cc0000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            background-color: var(--espn-red);
            height: 48px;
            padding: 0 20px;
            display: flex;
            align-items: center;
        }

        .logo {
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            font-style: italic;
            font-size: 1.5rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }

        .sub-nav {
            background-color: var(--bg-navbar);
            height: 40px;
            display: flex;
            padding: 0 20px;
        }

        .sub-nav ul {
            display: flex;
            list-style: none;
            height: 100%;
        }

        .sub-nav li {
            height: 100%;
        }

        .sub-nav button {
            background: transparent;
            border: none;
            color: #ffffff;
            opacity: 0.7;
            padding: 0 16px;
            height: 100%;
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }

        .sub-nav button:hover, .sub-nav li.active button {
            opacity: 1;
            border-bottom-color: var(--espn-red);
        }

        .ticker-wrapper {
            background-color: var(--bg-ticker);
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            padding: 10px 20px;
            gap: 12px;
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.02);
        }

        .ticker-card {
            display: inline-block;
            border-right: 1px solid var(--border-color);
            padding-right: 12px;
            min-width: 160px;
        }

        .ticker-status {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .ticker-status.live {
            color: var(--live-color);
        }

        .ticker-team {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .ticker-team.loser {
            color: var(--text-muted);
        }

        .main-layout {
            display: flex;
            max-width: 1280px;
            width: 100%;
            margin: 24px auto;
            padding: 0 20px;
            gap: 24px;
        }

        .news-column {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .scores-column {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .column-title {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: 700;
            border-bottom: 2px solid var(--text-dark);
            padding-bottom: 4px;
            margin-bottom: 12px;
        }

        .news-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .news-headline {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-dark);
        }

        .news-description {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .news-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .score-list-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .game-meta-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 6px;
        }

        .panel-team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-team-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-logo {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .panel-name {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .panel-score {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .panel-team-row.loser {
            opacity: 0.5;
        }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">PulseNetwork</div>
    </nav>

    <div class="sub-nav">
        <ul>
            <li class="active"><button onclick="switchLeague('basketball/nba', this)">NBA</button></li>
            <li><button onclick="switchLeague('football/nfl', this)">NFL</button></li>
            <li><button onclick="switchLeague('baseball/mlb', this)">MLB</button></li>
            <li><button onclick="switchLeague('hockey/nhl', this)">NHL</button></li>
        </ul>
    </div>

    <div class="ticker-wrapper" id="ticker-target">
        Loading score ticker...
    </div>

    <div class="main-layout">
        <div class="news-column">
            <div class="column-title">Top Headlines</div>
            <div id="news-target">Loading sports wire data...</div>
        </div>

        <div class="scores-column">
            <div class="column-title">Game Box Scores</div>
            <div id="scores-target">Loading active events...</div>
        </div>
    </div>

    <script>
        let selectedRoute = 'basketball/nba';
        let backgroundTicker;
        
        // This public proxy circumvents the browser CORS policy safely
        const corsProxy = "https://corsproxy.io/?";

        async function refreshDashboard() {
            const tickerBox = document.getElementById('ticker-target');
            const scoresBox = document.getElementById('scores-target');
            const newsBox = document.getElementById('news-target');

            let eventsData = [];
            let articlesData = [];

            // Fetch Scores through CORS Proxy
            try {
                const scoreTargetUrl = `https://site.api.espn.com/apis/site/v2/sports/${selectedRoute}/scoreboard`;
                const scoreRes = await fetch(corsProxy + encodeURIComponent(scoreTargetUrl));
                if (scoreRes.ok) {
                    const scoreData = await scoreRes.json();
                    eventsData = scoreData.events || [];
                }
            } catch (e) {
                console.error("Scores endpoint block:", e);
            }

            // Fetch News through CORS Proxy
            try {
                const newsTargetUrl = `https://site.api.espn.com/apis/site/v2/sports/news`;
                const newsRes = await fetch(corsProxy + encodeURIComponent(newsTargetUrl));
                if (newsRes.ok) {
                    const newsData = await newsRes.json();
                    articlesData = newsData.articles || [];
                }
            } catch (e) {
                console.error("News endpoint block:", e);
            }

            renderTicker(eventsData, tickerBox);
            renderDetailedScores(eventsData, scoresBox);
            renderNewsWire(articlesData, newsBox);
        }

        function renderTicker(events, target) {
            target.innerHTML = '';
            if (!events || events.length === 0) {
                target.innerHTML = '<div class="ticker-card"><div class="ticker-status">No games live or scheduled</div></div>';
                return;
            }

            events.forEach(game => {
                const comp = game.competitions?.[0];
                if (!comp) return;
                const status = game.status?.type;
                const home = comp.competitors?.find(c => c.homeAway === 'home');
                const away = comp.competitors?.find(c => c.homeAway === 'away');

                if (!home || !away) return;

                const isLive = status?.state === 'in';
                const isDone = status?.completed;
                const homeWin = parseInt(home.score) > parseInt(away.score);

                const tickerCard = document.createElement('div');
                tickerCard.className = 'ticker-card';

                tickerCard.innerHTML = `
                    <div class="ticker-status ${isLive ? 'live' : ''}">${isLive ? 'Live' : (status?.shortDetail || 'SCHED')}</div>
                    <div class="ticker-team ${isDone && !homeWin ? '' : 'loser'}">
                        <span>${away.team?.abbreviation || 'AWAY'}</span><span>${away.score || 0}</span>
                    </div>
                    <div class="ticker-team ${isDone && homeWin ? '' : 'loser'}">
                        <span>${home.team?.abbreviation || 'HOME'}</span><span>${home.score || 0}</span>
                    </div>
                `;
                target.appendChild(tickerCard);
            });
        }

        function renderDetailedScores(events, target) {
            target.innerHTML = '';
            if (!events || events.length === 0) {
                target.innerHTML = '<div class="score-list-card">No current match stats found.</div>';
                return;
            }

            events.forEach(game => {
                const comp = game.competitions?.[0];
                if (!comp) return;
                const status = game.status?.type;
                const home = comp.competitors?.find(c => c.homeAway === 'home');
                const away = comp.competitors?.find(c => c.homeAway === 'away');

                if (!home || !away) return;

                const isDone = status?.completed;
                const homeWin = parseInt(home.score) > parseInt(away.score);

                const card = document.createElement('div');
                card.className = 'score-list-card';

                card.innerHTML = `
                    <div class="game-meta-row">
                        <span>${status?.detail || 'Scheduled'}</span>
                        <span>${comp.broadcasts?.[0]?.names?.[0] || ''}</span>
                    </div>
                    <div class="panel-team-row ${isDone && !homeWin ? '' : 'loser'}">
                        <div class="panel-team-left">
                            <img class="panel-logo" src="${away.team?.logo || 'https://via.placeholder.com/24'}" alt="">
                            <span class="panel-name">${away.team?.displayName || 'Team'}</span>
                        </div>
                        <span class="panel-score">${away.score || 0}</span>
                    </div>
                    <div class="panel-team-row ${isDone && homeWin ? '' : 'loser'}">
                        <div class="panel-team-left">
                            <img class="panel-logo" src="${home.team?.logo || 'https://via.placeholder.com/24'}" alt="">
                            <span class="panel-name">${home.team?.displayName || 'Team'}</span>
                        </div>
                        <span class="panel-score">${home.score || 0}</span>
                    </div>
                `;
                target.appendChild(card);
            });
        }

        function renderNewsWire(articles, target) {
            target.innerHTML = '';
            if (!articles || articles.length === 0) {
                target.innerHTML = '<div class="news-card">Unable to load news feed.</div>';
                return;
            }

            articles.slice(0, 5).forEach(story => {
                const card = document.createElement('div');
                card.className = 'news-card';

                card.innerHTML = `
                    <div class="news-headline">${story.headline || 'Untitled Story'}</div>
                    <div class="news-description">${story.description || ''}</div>
                    <div class="news-meta">Source: ${story.source || 'Network Feed'}</div>
                `;
                target.appendChild(card);
            });
        }

        function switchLeague(route, element) {
            selectedRoute = route;
            document.querySelectorAll('.sub-nav li').forEach(el => el.classList.remove('active'));
            element.parentElement.classList.add('active');
            refreshDashboard();
        }

        refreshDashboard();
        clearInterval(backgroundTicker);
        backgroundTicker = setInterval(refreshDashboard, 30000);
    </script>
</body>
</html>
