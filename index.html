<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportPulse HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,700;1,700&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --espn-red: #ff002b;
            --bg-main: #0c0c0d;
            --bg-card: #161618;
            --bg-hover: #222225;
            --border-line: #2a2a2e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0ab;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 1. Full-Width Premium Top Score Ticker */
        .scores-ticker {
            background-color: #000000;
            border-bottom: 1px solid var(--border-line);
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 12px;
            gap: 12px;
            height: 76px;
            align-items: center;
        }
        .scores-ticker::-webkit-scrollbar { height: 3px; }
        .scores-ticker::-webkit-scrollbar-thumb { background: var(--border-line); }

        .ticker-item {
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid var(--border-line);
            padding-right: 20px;
            min-width: 170px;
        }

        .ticker-state {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--espn-red);
            margin-bottom: 4px;
            letter-spacing: 0.05em;
        }

        .ticker-team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .ticker-team-identity {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ticker-logo {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }

        .ticker-team-row.is-losing {
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* 2. Sleek Branding Header */
        nav {
            background-color: #000000;
            height: 56px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-line);
            position: relative;
            z-index: 100;
        }

        .brand-logo {
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            font-style: italic;
            font-size: 1.5rem;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }
        .brand-logo span { color: var(--espn-red); }

        /* Integrated Compact Dropdown Menu */
        .league-selector-wrapper { position: relative; }
        .menu-trigger {
            background-color: var(--bg-card);
            border: 1px solid var(--border-line);
            color: var(--text-primary);
            padding: 8px 14px;
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 4px);
            right: 0;
            background-color: var(--bg-card);
            border: 1px solid var(--border-line);
            border-radius: 4px;
            list-style: none;
            width: 160px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            display: none;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-menu button {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 10px 16px;
            text-align: left;
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
        }
        .dropdown-menu button:hover { background-color: var(--bg-hover); color: var(--espn-red); }

        /* 3. Main Interface Splitscreen Layout */
        .workspace {
            display: grid;
            grid-template-columns: 2fr 1.2fr;
            max-width: 1400px;
            width: 100%;
            margin: 20px auto;
            padding: 0 24px;
            gap: 24px;
            flex: 1;
        }

        .module-header {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .module-header::before {
            content: '';
            display: block;
            width: 4px;
            height: 14px;
            background-color: var(--espn-red);
        }

        /* 4. Left Column - News Feed Architecture */
        .column-news { display: flex; flex-direction: column; gap: 16px; }
        
        .news-node {
            background-color: var(--bg-card);
            border: 1px solid var(--border-line);
            border-radius: 6px;
            overflow: hidden;
            transition: border-color 0.2s, background-color 0.2s;
        }
        .news-node:hover {
            border-color: #44444a;
            background-color: var(--bg-hover);
        }

        .news-link {
            text-decoration: none;
            color: inherit;
            display: grid;
            grid-template-columns: 220px 1fr;
        }

        .news-img-container {
            width: 220px;
            height: 140px;
            background-color: #000;
        }
        .news-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .news-content {
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .news-headline {
            font-size: 1.2rem;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 6px;
        }

        .news-summary {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-source {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-top: 8px;
        }

        /* 5. Right Column - Bulletins Layout */
        .column-headlines { display: flex; flex-direction: column; gap: 10px; }

        .headline-link-node {
            text-decoration: none;
            background-color: var(--bg-card);
            border: 1px solid var(--border-line);
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .headline-link-node:hover {
            background-color: var(--bg-hover);
        }

        .headline-title {
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.4;
            color: var(--text-primary);
        }

        .fallback-alert {
            padding: 30px;
            text-align: center;
            color: var(--text-secondary);
            background-color: var(--bg-card);
            border: 1px dashed var(--border-line);
            border-radius: 6px;
            font-size: 0.9rem;
        }

        @media (max-width: 900px) {
            .workspace { grid-template-columns: 1fr; padding: 0 16px; }
            .news-link { grid-template-columns: 1fr; }
            .news-img-container { width: 100%; height: 180px; }
        }
    </style>
</head>
<body>

    <div class="scores-ticker" id="ticker-output">
        <div class="ticker-item"><div class="ticker-state">Loading scores...</div></div>
    </div>

    <nav>
        <div class="brand-logo" id="brand-label">NBA <span>Live</span></div>
        
        <div class="league-selector-wrapper">
            <button class="menu-trigger" onclick="toggleMenu(event)">
                Change League ▼
            </button>
            <ul class="dropdown-menu" id="league-dropdown">
                <li><button onclick="changeContext('basketball/nba', 'NBA Live')">NBA</button></li>
                <li><button onclick="changeContext('football/nfl', 'NFL Live')">NFL</button></li>
                <li><button onclick="changeContext('baseball/mlb', 'MLB Live')">MLB</button></li>
                <li><button onclick="changeContext('hockey/nhl', 'NHL Live')">NHL</button></li>
            </ul>
        </div>
    </nav>

    <div class="workspace">
        <div class="column-news">
            <div class="module-header">Featured News</div>
            <div id="news-output">
                <div class="fallback-alert">Loading headlines...</div>
            </div>
        </div>

        <div class="column-headlines">
            <div class="module-header">Latest Bulletins</div>
            <div id="headlines-output">
                <div class="fallback-alert">Loading feed...</div>
            </div>
        </div>
    </div>

    <script>
        let endpointRoute = 'basketball/nba';
        let backgroundSyncLoop;
        
        function execDataPipeline() {
            fetchJSONP(
                `https://site.api.espn.com/apis/site/v2/sports/${endpointRoute}/scoreboard?limit=25`, 
                'handleScoresResponse'
            );

            fetchJSONP(
                `https://site.api.espn.com/apis/site/v2/sports/${endpointRoute}/news?limit=15`, 
                'handleNewsResponse'
            );
        }

        function fetchJSONP(url, callbackName) {
            const oldScript = document.getElementById(`jsonp-${callbackName}`);
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = `jsonp-${callbackName}`;
            script.src = `${url}&callback=${callbackName}`;
            document.body.appendChild(script);
        }

        window.handleScoresResponse = function(data) {
            const tickerBox = document.getElementById('ticker-output');
            renderTickerTape(data.events || [], tickerBox);
        };

        window.handleNewsResponse = function(data) {
            const newsBox = document.getElementById('news-output');
            const headlinesBox = document.getElementById('headlines-output');
            const articles = data.articles || [];
            
            renderNewsFeed(articles, newsBox);
            renderHeadlinesWire(articles, headlinesBox);
        };

        function renderTickerTape(events, container) {
            container.innerHTML = '';
            if (events.length === 0) {
                container.innerHTML = '<div class="ticker-item"><div class="ticker-state">No games scheduled</div></div>';
                return;
            }

            events.forEach(game => {
                const comp = game.competitions?.[0];
                if (!comp) return;
                
                const status = game.status?.type;
                const home = comp.competitors?.find(c => c.homeAway === 'home');
                const away = comp.competitors?.find(c => c.homeAway === 'away');

                if (!home || !away) return;

                const live = status?.state === 'in';
                const done = status?.completed;
                const homeWinner = parseInt(home.score) > parseInt(away.score);

                const div = document.createElement('div');
                div.className = 'ticker-item';

                div.innerHTML = `
                    <div class="ticker-state">${live ? 'LIVE' : (status?.shortDetail || 'SCHED')}</div>
                    <div class="ticker-team-row ${done && !homeWinner ? '' : 'is-losing'}">
                        <div class="ticker-team-identity">
                            <img class="ticker-logo" src="${away.team?.logo || 'https://a.espncdn.com/combiner/i?img=/i/teamlogos/default-team-logo-500.png'}" alt="">
                            <span>${away.team?.abbreviation || 'AWAY'}</span>
                        </div>
                        <span>${away.score || 0}</span>
                    </div>
                    <div class="ticker-team-row ${done && homeWinner ? '' : 'is-losing'}">
                        <div class="ticker-team-identity">
                            <img class="ticker-logo" src="${home.team?.logo || 'https://a.espncdn.com/combiner/i?img=/i/teamlogos/default-team-logo-500.png'}" alt="">
                            <span>${home.team?.abbreviation || 'HOME'}</span>
                        </div>
                        <span>${home.score || 0}</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderNewsFeed(articles, container) {
            container.innerHTML = '';
            const targeted = articles.slice(0, 5);

            if (targeted.length === 0) {
                container.innerHTML = '<div class="fallback-alert">No featured stories available.</div>';
                return;
            }

            targeted.forEach(story => {
                const link = story.links?.web?.href || '#';
                const img = story.images?.[0]?.url || 'https://a.espncdn.com/combiner/i?img=/i/teamlogos/default-team-logo-500.png';

                const node = document.createElement('div');
                node.className = 'news-node';
                node.innerHTML = `
                    <a href="${link}" target="_blank" class="news-link">
                        <div class="news-img-container">
                            <img class="news-img" src="${img}" alt="">
                        </div>
                        <div class="news-content">
                            <div>
                                <div class="news-headline">${story.headline}</div>
                                <div class="news-summary">${story.description || ''}</div>
                            </div>
                            <div class="news-source">Wire: ${story.source || 'ESPN'}</div>
                        </div>
                    </a>
                `;
                container.appendChild(node);
            });
        }

        function renderHeadlinesWire(articles, container) {
            container.innerHTML = '';
            const targeted = articles.slice(5, 12);

            if (targeted.length === 0) {
                container.innerHTML = '<div class="fallback-alert">No bulletins available.</div>';
                return;
            }

            targeted.forEach(story => {
                const link = story.links?.web?.href || '#';
                const node = document.createElement('a');
                node.className = 'headline-link-node';
                node.href = link;
                node.target = '_blank';
                node.innerHTML = `
                    <div class="headline-title">${story.headline}</div>
                    <div class="news-source">Source: ${story.source || 'Sports Wire'}</div>
                `;
                container.appendChild(node);
            });
        }

        function toggleMenu(event) {
            event.stopPropagation();
            document.getElementById('league-dropdown').classList.toggle('show');
        }

        function changeContext(route, label) {
            endpointRoute = route;
            document.getElementById('brand-label').innerHTML = label.replace(' Live', ' <span>Live</span>');
            document.getElementById('league-dropdown').classList.remove('show');
            execDataPipeline();
        }

        window.onclick = function() {
            document.getElementById('league-dropdown').classList.remove('show');
        }

        execDataPipeline();
        clearInterval(backgroundSyncLoop);
        backgroundSyncLoop = setInterval(execDataPipeline, 30000);
    </script>
</body>
</html>
