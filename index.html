<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportPulse Prime</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #090d16;
            --bg-sidebar: #0f1524;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-hover: rgba(255, 255, 255, 0.06);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.15);
            --winner-green: #4ade80;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            letter-spacing: -0.01em;
        }

        /* Modern Sidebar */
        aside {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            gap: 32px;
        }

        .brand h1 {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-item button {
            width: 100%;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            padding: 14px 18px;
            border-radius: 14px;
            text-align: left;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-item button:hover {
            background-color: var(--card-hover);
            color: var(--text-primary);
        }

        .menu-item.active button {
            background-color: var(--accent-glow);
            color: var(--accent);
            border-color: rgba(56, 189, 248, 0.2);
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.05);
        }

        /* Content Area */
        main {
            flex: 1;
            padding: 40px 50px;
            overflow-y: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        header h2 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .refresh-indicator {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-glow);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(56, 189, 248, 0.15);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-indicator::before {
            content: '';
            width: 6px;
            height: 6px;
            background-color: var(--accent);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        /* Glassmorphic Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }

        /* Slick Game Cards */
        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .game-card:hover {
            transform: translateY(-4px);
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 8px;
        }

        .status-badge.live {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .broadcast {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 8px;
        }

        .team-box {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-details {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .team-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        .team-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .team-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .team-record {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .team-score {
            font-size: 1.75rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            color: var(--text-secondary);
        }

        .winner .team-score {
            color: var(--text-primary);
        }

        .winner .team-name {
            color: var(--text-primary);
        }

        /* Highlight Info Footer */
        .card-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .headline {
            color: #f59e0b;
        }

        .status-msg {
            text-align: center;
            grid-column: 1 / -1;
            padding: 60px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            aside { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); padding: 24px; }
            main { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="brand">
            <h1>⚡ SportPulse Prime</h1>
        </div>
        <ul class="menu-list">
            <li class="menu-item active"><button onclick="changeSport('basketball/nba', this)">🏀 NBA</button></li>
            <li class="menu-item"><button onclick="changeSport('football/nfl', this)">🏈 NFL</button></li>
            <li class="menu-item"><button onclick="changeSport('baseball/mlb', this)">⚾ MLB</button></li>
            <li class="menu-item"><button onclick="changeSport('hockey/nhl', this)">🏒 NHL</button></li>
            <li class="menu-item"><button onclick="changeSport('soccer/eng.1', this)">⚽ Premier League</button></li>
        </ul>
    </aside>

    <main>
        <header>
            <h2 id="sport-title">NBA Scores</h2>
            <div class="refresh-indicator" id="refresh-time">Syncing live data...</div>
        </header>

        <div class="dashboard-grid" id="dashboard-grid">
            <div class="status-msg">Loading dashboard matrix...</div>
        </div>
    </main>

    <script>
        let endpoint = 'basketball/nba';
        let autoRefreshInterval;

        async function fetchDashboardData() {
            const grid = document.getElementById('dashboard-grid');
            const updateLabel = document.getElementById('refresh-time');

            try {
                const response = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${endpoint}/scoreboard`);
                if (!response.ok) throw new Error('Data drop detected.');
                const data = await response.json();
                
                renderCards(data.events);
                
                const now = new Date();
                updateLabel.textContent = `Live • ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})}`;
            } catch (err) {
                console.error(err);
                grid.innerHTML = `<div class="status-msg">Connection error. Retrying snapshot download...</div>`;
            }
        }

        function renderCards(events) {
            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = '';

            if (!events || events.length === 0) {
                grid.innerHTML = '<div class="status-msg">No matches scheduled on the grid today.</div>';
                return;
            }

            events.forEach(game => {
                const match = game.competitions[0];
                const statusType = game.status.type;
                const statusText = game.status.type.detail;
                
                const home = match.competitors.find(t => t.homeAway === 'home');
                const away = match.competitors.find(t => t.homeAway === 'away');

                const isCompleted = statusType.completed;
                const isLive = statusType.state === 'in';
                const homeScore = parseInt(home.score) || 0;
                const awayScore = parseInt(away.score) || 0;

                const broadcast = match.broadcasts?.[0]?.names?.[0] || '';
                const note = game.headlines?.[0]?.shortLinkText || match.notes?.[0]?.headline || '';

                const card = document.createElement('div');
                card.className = 'game-card';

                card.innerHTML = `
                    <div class="card-header">
                        <span class="status-badge ${isLive ? 'live' : ''}">${isLive ? '● Live' : statusText}</span>
                        ${broadcast ? `<span class="broadcast">${broadcast}</span>` : ''}
                    </div>
                    <div class="team-box">
                        <div class="team-row ${isCompleted && awayScore > homeScore ? 'winner' : ''}">
                            <div class="team-details">
                                <img class="team-logo" src="${away.team.logo || 'https://via.placeholder.com/40'}" alt="logo">
                                <div class="team-meta">
                                    <span class="team-name">${away.team.displayName}</span>
                                    <span class="team-record">${away.records?.[0]?.summary || '0-0'}</span>
                                </div>
                            </div>
                            <span class="team-score">${away.score}</span>
                        </div>
                        <div class="team-row ${isCompleted && homeScore > awayScore ? 'winner' : ''}">
                            <div class="team-details">
                                <img class="team-logo" src="${home.team.logo || 'https://via.placeholder.com/40'}" alt="logo">
                                <div class="team-meta">
                                    <span class="team-name">${home.team.displayName}</span>
                                    <span class="team-record">${home.records?.[0]?.summary || '0-0'}</span>
                                </div>
                            </div>
                            <span class="team-score">${home.score}</span>
                        </div>
                    </div>
                    ${note ? `
                    <div class="card-footer">
                        <span class="headline">✨</span> <span>${note}</span>
                    </div>` : ''}
                `;
                grid.appendChild(card);
            });
        }

        function changeSport(newEndpoint, element) {
            endpoint = newEndpoint;
            
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            element.parentElement.classList.add('active');
            
            document.getElementById('sport-title').textContent = element.textContent.split(' ')[1] + " Scores";
            
            fetchDashboardData();
        }

        fetchDashboardData();
        clearInterval(autoRefreshInterval);
        autoRefreshInterval = setInterval(fetchDashboardData, 15000);
    </script>
</body>
</html>
