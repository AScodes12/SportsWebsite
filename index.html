<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESPN Flow Scoreboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,400;0,700;1,700&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --espn-red: #ff002b;
            --bg-dark: #000000;
            --bg-nav: #111112;
            --bg-subnav: #27272a;
            --bg-container: #18181b;
            --bg-surface: #242427;
            --border-muted: #3f3f46;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --live-green: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ESPN Main Red Header Bar */
        nav {
            background-color: var(--espn-red);
            height: 48px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .brand-logo {
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            font-style: italic;
            font-size: 1.6rem;
            color: #ffffff;
            letter-spacing: -0.06em;
            text-transform: uppercase;
        }

        /* League Secondary Navigation Bar */
        .sub-nav {
            background-color: var(--bg-nav);
            border-bottom: 1px solid var(--border-muted);
            height: 44px;
            display: flex;
            padding: 0 24px;
            overflow-x: auto;
        }

        .sub-nav ul {
            display: flex;
            list-style: none;
            height: 100%;
        }

        .sub-nav li {
            height: 100%;
        }

        .sub-nav button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0 20px;
            height: 100%;
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.95rem;
            cursor: pointer;
            letter-spacing: 0.02em;
            border-bottom: 3px solid transparent;
            transition: all 0.15s ease;
        }

        .sub-nav button:hover {
            color: var(--text-main);
        }

        .sub-nav li.active button {
            color: var(--text-main);
            border-bottom-color: var(--espn-red);
        }

        /* Horizontal Ticker Tape Layout */
        .scores-ticker {
            background-color: var(--bg-subnav);
            border-bottom: 1px solid var(--border-muted);
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 8px 16px;
            gap: 4px;
        }

        .ticker-item {
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid var(--border-muted);
            padding: 0 16px;
            min-width: 150px;
        }

        .ticker-state {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .ticker-state.is-live {
            color: var(--espn-red);
        }

        .ticker-team-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .ticker-team-row.is-losing {
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Split-Screen Interface Architecture */
        .workspace {
            display: flex;
            max-width: 1400px;
            width: 100%;
            margin: 24px auto;
            padding: 0 24px;
            gap: 24px;
        }

        .column-left {
            flex: 2.2;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .column-right {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .module-header {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: 700;
            border-bottom: 3px solid var(--espn-red);
            padding-bottom: 6px;
            margin-bottom: 8px;
            letter-spacing: 0.02em;
        }

        /* News Wire Cards */
        .news-node {
            background-color: var(--bg-container);
            border: 1px solid var(--border-muted);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .news-headline {
            font-size: 1.3rem;
            font-weight: 900;
            line-height: 1.25;
            color: var(--text-main);
        }

        .news-summary {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.45;
        }

        .news-source {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
        }

        /* Detailed Grid Event Blocks */
        .match-block {
            background-color: var(--bg-container);
            border: 1px solid var(--border-muted);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .match-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-muted);
            padding-bottom: 8px;
        }

        .match-meta .live-txt {
            color: var(--espn-red);
        }

        .match-team-table {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .match-team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .match-team-identity {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .match-logo {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .match-name {
            font-size: 1rem;
            font-weight: 700;
        }

        .match-score {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .match-team-row.is-losing {
            color: var(--text-muted);
        }

        .match-team-row.is-losing .match-name {
            font-weight: 400;
        }

        .fallback-alert {
            grid-column: 1 / -1;
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            background-color: var(--bg-container);
            border: 1px dashed var(--border-muted);
            font-size: 0.95rem;
        }

        @media (max-width: 960px) {
            .workspace { flex-direction: column; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="brand-logo">SportPulse</div>
    </nav>

    <div class="sub-nav">
        <ul>
            <li class="active"><button onclick="changeContext('basketball/nba', this)">NBA</button></li>
            <li><button onclick="changeContext('football/nfl', this)">NFL</button></li>
            <li><button onclick="changeContext('baseball/mlb', this)">MLB</button></li>
            <li><button onclick="changeContext('hockey/nhl', this)">NHL</button></li>
        </ul>
    </div>

    <div class="scores-ticker" id="ticker-output">
        <div class="ticker-item"><div class="ticker-state">Syncing network data streams...</div></div>
    </div>

    <div class="workspace">
        <div class="column-left">
            <div class="module-header">Top Headlines</div>
            <div id="news-output">
                <div class="fallback-alert">Downloading current global wire dispatches...</div>
            </div>
        </div>

        <div class="column-right">
            <div class="module-header">Live Scoreboard</div>
            <div id="scores-output">
                <div class="fallback-alert">Awaiting active matchup profiles...</div>
            </div>
        </div>
    </div>

    <script>
        let endpointRoute = 'basketball/nba';
        let backgroundSyncLoop;

        // Main orchestrator using native script elements to skip CORS proxies completely
        function execDataPipeline() {
            fetchJSONP(
                `https://site.api.espn.com/apis/site/v2/sports/${endpointRoute}/scoreboard?limit=20`, 
                'handleScoresResponse'
            );

            fetchJSONP(
                `https://site.api.espn.com/apis/site/v2/sports/news?limit=10`, 
                'handleNewsResponse'
            );
        }

        function fetchJSONP(url, callbackName) {
            const oldScript = document.getElementById(`jsonp-${callbackName}`);
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = `jsonp-${callbackName}`;
            script.src = `${url}&callback=${callbackName}`;
            
            script.onerror = () => {
                console.error(`JSONP failure connection on ${callbackName}`);
            };

            document.body.appendChild(script);
        }

        // Processing scores entry point
        window.handleScoresResponse = function(data) {
            const tickerBox = document.getElementById('ticker-output');
            const scoresBox = document.getElementById('scores-output');
            const parsedEvents = data.events || [];
            
            renderTickerTape(parsedEvents, tickerBox);
            renderDetailedPanel(parsedEvents, scoresBox);
        };

        // Processing news headline entry point
        window.handleNewsResponse = function(data) {
            const newsBox = document.getElementById('news-output');
            const parsedArticles = data.articles || [];
            
            renderNewsWire(parsedArticles, newsBox);
        };

        function renderTickerTape(events, container) {
            container.innerHTML = '';
            if (!events || events.length === 0) {
                container.innerHTML = '<div class="ticker-item"><div class="ticker-state">No scheduled events today</div></div>';
                return;
            }

            events.forEach(game => {
                const comp = game.competitions?.[0];
                if (!comp) return;
                
                const status = game.status?.type;
                const home = comp.competitors?.find(c => c.homeAway === 'home');
                const away = comp.competitors?.find(c => c.homeAway === 'away');

                if (!home || !away) return;

                const live = status?.state === 'in';
                const done = status?.completed;
                const homeWinner = parseInt(home.score) > parseInt(away.score);

                const div = document.createElement('div');
                div.className = 'ticker-item';

                div.innerHTML = `
                    <div class="ticker-state ${live ? 'is-live' : ''}">${live ? 'LIVE' : (status?.shortDetail || 'SCHED')}</div>
                    <div class="ticker-team-row ${done && !homeWinner ? '' : 'is-losing'}">
                        <span>${away.team?.abbreviation || 'AWAY'}</span><span>${away.score || 0}</span>
                    </div>
                    <div class="ticker-team-row ${done && homeWinner ? '' : 'is-losing'}">
                        <span>${home.team?.abbreviation || 'HOME'}</span><span>${home.score || 0}</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderDetailedPanel(events, container) {
            container.innerHTML = '';
            if (!events || events.length === 0) {
                container.innerHTML = '<div class="fallback-alert">No matchup stats listed for this context.</div>';
                return;
            }

            events.forEach(game => {
                const comp = game.competitions?.[0];
                if (!comp) return;

                const status = game.status?.type;
                const home = comp.competitors?.find(c => c.homeAway === 'home');
                const away = comp.competitors?.find(c => c.homeAway === 'away');

                if (!home || !away) return;

                const live = status?.state === 'in';
                const done = status?.completed;
                const homeWinner = parseInt(home.score) > parseInt(away.score);

                const card = document.createElement('div');
                card.className = 'match-block';

                card.innerHTML = `
                    <div class="match-meta">
                        <span class="${live ? 'live-txt' : ''}">${live ? 'LIVE' : (status?.detail || 'Scheduled')}</span>
                        <span>${comp.broadcasts?.[0]?.names?.[0] || ''}</span>
                    </div>
                    <div class="match-team-table">
                        <div class="match-team-row ${done && !homeWinner ? '' : 'is-losing'}">
                            <div class="match-team-identity">
                                <img class="match-logo" src="${away.team?.logo || 'https://via.placeholder.com/28'}" alt="">
                                <span class="match-name">${away.team?.displayName || 'Team'}</span>
                            </div>
                            <span class="match-score">${away.score || 0}</span>
                        </div>
                        <div class="match-team-row ${done && homeWinner ? '' : 'is-losing'}">
                            <div class="match-team-identity">
                                <img class="match-logo" src="${home.team?.logo || 'https://via.placeholder.com/28'}" alt="">
                                <span class="match-name">${home.team?.displayName || 'Team'}</span>
                            </div>
                            <span class="match-score">${home.score || 0}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderNewsWire(articles, container) {
            container.innerHTML = '';
            if (!articles || articles.length === 0) {
                container.innerHTML = '<div class="fallback-alert">No general editorial items are available.</div>';
                return;
            }

            articles.slice(0, 5).forEach(story => {
                const node = document.createElement('div');
                node.className = 'news-node';

                node.innerHTML = `
                    <div class="news-headline">${story.headline || 'Untitled Release'}</div>
                    <div class="news-summary">${story.description || ''}</div>
                    <div class="news-source">Source: ${story.source || 'Wire Reports'}</div>
                `;
                container.appendChild(node);
            });
        }

        function changeContext(route, element) {
            endpointRoute = route;
            document.querySelectorAll('.sub-nav li').forEach(el => el.classList.remove('active'));
            element.parentElement.classList.add('active');
            execDataPipeline();
        }

        execDataPipeline();
        clearInterval(backgroundSyncLoop);
        backgroundSyncLoop = setInterval(execDataPipeline, 30000);
    </script>
</body>
</html>
