<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Sports Scores</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-secondary: #aaaaaa;
            --accent-color: #cc0000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 2px solid transparent;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            border-color: var(--accent-color);
            background-color: var(--accent-color);
        }

        .scores-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .game-status {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .team-logo {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .team-name {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .team-score {
            font-size: 1.25rem;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            grid-column: 1 / -1;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>🏆 Real-Time Scores</h1>
        <p>Powered by ESPN's Public API</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchSport('basketball/nba', this)">NBA</button>
        <button class="tab-btn" onclick="switchSport('football/nfl', this)">NFL</button>
    </div>

    <div class="scores-container" id="scores-container">
        <div class="loading">Loading games...</div>
    </div>

    <script>
        let currentSport = 'basketball/nba';

        async function fetchScores(sportPath) {
            const container = document.getElementById('scores-container');
            container.innerHTML = '<div class="loading">Loading games...</div>';

            try {
                // ESPN's undocumented site-facing API endpoint
                const response = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${sportPath}/scoreboard`);
                const data = await response.json();
                
                displayGames(data.events);
            } catch (error) {
                console.error("Error fetching data from ESPN:", error);
                container.innerHTML = '<div class="loading">Failed to load scores. Try again later!</div>';
            }
        }

        function displayGames(events) {
            const container = document.getElementById('scores-container');
            container.innerHTML = '';

            if (!events || events.length === 0) {
                container.innerHTML = '<div class="loading">No games scheduled for today.</div>';
                return;
            }

            events.forEach(event => {
                const competition = event.competitions[0];
                const status = event.status.type.detail;
                
                const homeTeam = competition.competitors.find(c => c.homeAway === 'home');
                const awayTeam = competition.competitors.find(c => c.homeAway === 'away');

                const card = document.createElement('div');
                card.className = 'game-card';

                card.innerHTML = `
                    <div class="game-status">${status}</div>
                    <div class="team-row">
                        <div class="team-info">
                            <img class="team-logo" src="${awayTeam.team.logo || 'https://via.placeholder.com/30'}" alt="${awayTeam.team.displayName}">
                            <span class="team-name">${awayTeam.team.displayName}</span>
                        </div>
                        <span class="team-score">${awayTeam.score}</span>
                    </div>
                    <div class="team-row">
                        <div class="team-info">
                            <img class="team-logo" src="${homeTeam.team.logo || 'https://via.placeholder.com/30'}" alt="${homeTeam.team.displayName}">
                            <span class="team-name">${homeTeam.team.displayName}</span>
                        </div>
                        <span class="team-score">${homeTeam.score}</span>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function switchSport(sportPath, button) {
            // Update active tab styling
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            
            // Fetch data for the new sport
            currentSport = sportPath;
            fetchScores(sportPath);
        }

        // Initial fetch on page load
        fetchScores(currentSport);

        // Auto-refresh data every 30 seconds
        setInterval(() => {
            fetchScores(currentSport);
        }, 30000);
    </script>
</body>
</html>
