<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESPN Flow Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,400;0,700;1,700&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --espn-red: #ff002b;
            --bg-dark: #000000;
            --bg-nav: #111112;
            --bg-subnav: #1c1c1e;
            --bg-container: #111112;
            --bg-surface: #1c1c1e;
            --border-muted: #2d2d30;
            --text-main: #ffffff;
            --text-muted: #96969a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Horizontal Scores Ticker Strip */
        .scores-ticker {
            background-color: var(--bg-nav);
            border-bottom: 1px solid var(--border-muted);
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 16px;
            gap: 4px;
            height: 64px;
        }

        .ticker-item {
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid var(--border-muted);
            padding: 0 20px;
            min-width: 160px;
        }

        .ticker-state {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .ticker-state.is-live {
            color: var(--espn-red);
        }

        .ticker-team-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 1px;
            gap: 20px;
        }

        .ticker-team-row.is-losing {
            color: var(--text-muted);
            font-weight: 400;
        }

        /* ESPN Main Red Header Bar with Integrated Expandable Selector */
        nav {
            background-color: var(--espn-red);
            height: 52px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 100;
        }

        .brand-logo {
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            font-style: italic;
            font-size: 1.5rem;
            color: #ffffff;
            letter-spacing: -0.06em;
            text-transform: uppercase;
        }

        /* Native Expandable Dropdown Component */
        .league-selector-wrapper {
            position: relative;
        }

        .menu-trigger {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 8px 16px;
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .menu-trigger:hover {
            background-color: rgba(0, 0, 0, 0.4);
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 4px);
            right: 0;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-muted);
            border-radius: 4px;
            list-style: none;
            width: 180px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: none;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-menu button {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 12px 16px;
            text-align: left;
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s;
        }

        .dropdown-menu button:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--espn-red);
        }

        /* Main Workspace Content Layout */
        .workspace {
            display: flex;
            max-width: 1400px;
            width: 100%;
            margin: 24px auto;
            padding: 0 24px;
            gap: 32px;
            flex: 1;
        }

        .column-news {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .column-headlines {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .module-header {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: 700;
            border-bottom: 2px solid var(--espn-red);
            padding-bottom: 6px;
            margin-bottom: 8px;
            letter-spacing: 0.02em;
        }

        /* News Wire Cards (Left Side) */
        .news-node {
            background-color: var(--bg-container);
            border-bottom: 1px solid var(--border-muted);
            padding-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .news-headline {
            font-size: 1.4rem;
            font-weight: 900;
            line-height: 1.25;
            color: var(--text-main);
            transition: color 0.2s;
        }

        .news-summary {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .news-source {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
        }

        /* Headlines Wire Entries (Right Side) */
        .headline-link-node {
            background-color: var(--bg-surface);
            border-left: 3px solid var(--border-muted);
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: border-left-color 0.2s;
        }

        .headline-link-node:hover {
            border-left-color: var(--espn-red);
        }

        .headline-title {
            font-size: 1rem;
            font-weight: 700;
            line-height: 1.35;
            color: var(--text-main);
        }

        .fallback-alert {
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            background-color: var(--bg-surface);
            border: 1px dashed var(--border-muted);
            font-size: 0.95rem;
        }

        @media (max-width: 960px) {
            .workspace { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="scores-ticker" id="ticker-output">
        <div class="ticker-item"><div class="ticker-state">Loading score ticker...</div></div>
    </div>

    <nav>
        <div class="brand-logo" id="brand-label">NBA Live</div>
        
        <div class="league-selector-wrapper">
            <button class="menu-trigger" onclick="toggleMenu(event)">
                Change League ▼
            </button>
            <ul class="dropdown-menu" id="league-dropdown">
                <li><button onclick="changeContext('basketball/nba', 'NBA Live')">NBA</button></li>
                <li><button onclick="changeContext('football/nfl', 'NFL Live')">NFL</button></li>
                <li><button onclick="changeContext('baseball/mlb', 'MLB Live')">MLB</button></li>
                <li><button onclick="changeContext('hockey/nhl', 'NHL Live')">NHL</button></li>
            </ul>
        </div>
    </nav>

    <div class="workspace">
        <div class="column-news">
            <div class="module-header">Featured Stories</div>
            <div id="news-output">
                <div class="fallback-alert">Pulling active data feeds...</div>
            </div>
        </div>

        <div class="column-headlines">
            <div class="module-header">Latest Headlines</div>
            <div id="headlines-output">
                <div class="fallback-alert">Awaiting data loop updates...</div>
            </div>
        </div>
    </div>

    <script>
        let endpointRoute = 'basketball/nba';
        let backgroundSyncLoop;
        
        // JSONP dynamic execution script configuration to handle data direct from ESPN without CORS
        function execDataPipeline() {
            fetchJSONP(
                `https://site.api.espn.com/apis/site/v2/sports/${endpointRoute}/scoreboard?limit=25`, 
                'handleScoresResponse'
            );

            fetchJSONP(
                `https://site.api.espn.com/apis/site/v2/sports/news?limit=15`, 
                'handleNewsResponse'
            );
        }

        function fetchJSONP(url, callbackName) {
            const oldScript = document.getElementById(`jsonp-${callbackName}`);
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = `jsonp-${callbackName}`;
            script.src = `${url}&callback=${callbackName}`;
            
            script.onerror = () => {
                console.error(`JSONP stream disruption for function: ${callbackName}`);
            };

            document.body.appendChild(script);
        }

        // Ticker and Scores Callback Execution
        window.handleScoresResponse = function(data) {
            const tickerBox = document.getElementById('ticker-output');
            const parsedEvents = data.events || [];
            renderTickerTape(parsedEvents, tickerBox);
        };

        // News Wire Callback Execution
        window.handleNewsResponse = function(data) {
            const newsBox = document.getElementById('news-output');
            const headlinesBox = document.getElementById('headlines-output');
            const parsedArticles = data.articles || [];
            
            renderNewsFeed(parsedArticles, newsBox);
            renderHeadlinesWire(parsedArticles, headlinesBox);
        };

        function renderTickerTape(events, container) {
            container.innerHTML = '';
            if (!events || events.length === 0) {
                container.innerHTML = '<div class="ticker-item"><div class="ticker-state">No scheduled events found</div></div>';
                return;
            }

            events.forEach(game => {
                const comp = game.competitions?.[0];
                if (!comp) return;
                
                const status = game.status?.type;
                const home = comp.competitors?.find(c => c.homeAway === 'home');
                const away = comp.competitors?.find(c => c.homeAway === 'away');

                if (!home || !away) return;

                const live = status?.state === 'in';
                const done = status?.completed;
                const homeWinner = parseInt(home.score) > parseInt(away.score);

                const div = document.createElement('div');
                div.className = 'ticker-item';

                div.innerHTML = `
                    <div class="ticker-state ${live ? 'is-live' : ''}">${live ? 'LIVE' : (status?.shortDetail || 'SCHED')}</div>
                    <div class="ticker-team-row ${done && !homeWinner ? '' : 'is-losing'}">
                        <span>${away.team?.abbreviation || 'AWAY'}</span><span>${away.score || 0}</span>
                    </div>
                    <div class="ticker-team-row ${done && homeWinner ? '' : 'is-losing'}">
                        <span>${home.team?.abbreviation || 'HOME'}</span><span>${home.score || 0}</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderNewsFeed(articles, container) {
            container.innerHTML = '';
            // Display first 4 items as large news pieces with descriptions
            const targetedArticles = articles.slice(0, 4);

            if (targetedArticles.length === 0) {
                container.innerHTML = '<div class="fallback-alert">No editorial features logged.</div>';
                return;
            }

            targetedArticles.forEach(story => {
                const node = document.createElement('div');
                node.className = 'news-node';
                node.innerHTML = `
                    <div class="news-headline">${story.headline || 'Untitled Feature'}</div>
                    <div class="news-summary">${story.description || ''}</div>
                    <div class="news-source">Wire: ${story.source || 'Network Feed'}</div>
                `;
                container.appendChild(node);
            });
        }

        function renderHeadlinesWire(articles, container) {
            container.innerHTML = '';
            // Display remaining items as rapid fire headline modules
            const targetedHeadlines = articles.slice(4, 12);

            if (targetedHeadlines.length === 0) {
                container.innerHTML = '<div class="fallback-alert">No media bulletpoints cataloged.</div>';
                return;
            }

            targetedHeadlines.forEach(story => {
                const node = document.createElement('div');
                node.className = 'headline-link-node';
                node.innerHTML = `
                    <div class="headline-title">${story.headline}</div>
                    <div class="news-source">${story.source || 'Sports Wire'}</div>
                `;
                container.appendChild(node);
            });
        }

        // Dropdown Menu Interaction Controls
        function toggleMenu(event) {
            event.stopPropagation();
            document.getElementById('league-dropdown').classList.toggle('show');
        }

        function changeContext(route, label) {
            endpointRoute = route;
            document.getElementById('brand-label').textContent = label;
            document.getElementById('league-dropdown').classList.remove('show');
            execDataPipeline();
        }

        // Close menu automatically on general background window clicks
        window.onclick = function() {
            document.getElementById('league-dropdown').classList.remove('show');
        }

        execDataPipeline();
        clearInterval(backgroundSyncLoop);
        backgroundSyncLoop = setInterval(execDataPipeline, 30000);
    </script>
</body>
</html>
